{% extends "base.html" %}
{% block titre %}Prescriptions selon le poste{% endblock %}

{% block contenu %}
<button class="export-btn">Exporter (CSV/PDF)</button>
<section class="filters-box">
        <span class="filter-label">FILTRES :</span>

        <form action="{{ url_for('prescriptions.afficher') }}" method="get" class="api-form">

            <select name="profession_id" id="profession" required>
                <option value="">Profession</option>
                {% for p in professions %}
                    <option value="{{ p.id }}">{{ p.libelle }}</option>
                {% endfor %}
            </select>

            <select name="region_id" id="region" required>
                <option value="">Région</option>
                {% for r in regions %}
                    <option value="{{ r.id }}">{{ r.libelle }}</option>
                {% endfor %}
            </select>

            <select name="departement_id" id="departement" required>
                <option value="">Département</option>
            </select>

            <select name="annee" id="annee" required>
                {% for a in range(2024, 2014, -1) %}
                    <option value="{{ a }}">{{ a }}</option>
                {% endfor %}
            </select>

            <button type="submit">Afficher</button>

            <a href="{{ url_for('prescriptions.afficher') }}" class="reset-link">
                Réinitialiser
            </a>
        </form>
    </section>
